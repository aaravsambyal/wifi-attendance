services:
  app:
    build: .
    ports:
      - "3000:3000"
    restart: always
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey_replace_in_prod}
      - MONGODB_URI=mongodb://mongodb:27017/attendance_db
      - TRUST_PROXY=true
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - ./data:/usr/src/app/data
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
